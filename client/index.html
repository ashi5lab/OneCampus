<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- maximum-scale=1/user-scalable=no locks pinch/double-tap zoom — the
         layout is fixed-scale by design (see index.css's 16px .input rule,
         which fixes the actual cause of iOS auto-zooming into focused form
         fields; this is the backstop for zoom generally). -->
    <!-- viewport-fit=cover lets the standalone PWA draw edge-to-edge on
         notched/Dynamic-Island devices instead of Safari auto-inserting a
         blank inset — required for env(safe-area-inset-*) below to have a
         nonzero value to read. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <!-- Matches --surface (the mobile header/nav drawer's actual
         background across every theme in theme.css), not --bg (the general
         page background) — theme-color tints Safari/Android's own chrome
         above the app, and it was set to --bg (#F5F6F8, a visibly distinct
         light gray), creating a seam against the white header directly
         below it. -->
    <meta name="theme-color" content="#FFFFFF" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <!-- iOS ignores the web app manifest for "Add to Home Screen" — these
         three tags are what actually control its standalone icon/display
         mode/status bar; vite-plugin-pwa's manifest.webmanifest only
         covers Android/Chrome install. -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="OneCampus" />
    <title>OneCampus</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
