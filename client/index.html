<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- maximum-scale=1/user-scalable=no locks pinch/double-tap zoom — the
         layout is fixed-scale by design (see index.css's 16px .input rule,
         which fixes the actual cause of iOS auto-zooming into focused form
         fields; this is the backstop for zoom generally). -->
    <!-- viewport-fit=cover lets the standalone PWA draw edge-to-edge on
         notched/Dynamic-Island devices instead of Safari auto-inserting a
         blank inset — required for env(safe-area-inset-*) below to have a
         nonzero value to read. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <!-- Initial/pre-JS values — ConfigContext.jsx overwrites both of these
         at runtime to track the active theme's --sidebar-bg (white for the
         default "slate" theme), the same color the mobile header/nav drawer
         paint full-bleed under the status bar. These defaults match that
         theme so there's no flash of the wrong color before React mounts. -->
    <meta name="theme-color" content="#FFFFFF" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <!-- iOS ignores the web app manifest for "Add to Home Screen" — these
         three tags are what actually control its standalone icon/display
         mode/status bar; vite-plugin-pwa's manifest.webmanifest only
         covers Android/Chrome install.
         black-translucent makes the status bar a transparent overlay (app
         content, incl. the header/drawer's own background, extends fully
         underneath it) instead of an opaque OS-painted strip — this is what
         actually achieves the edge-to-edge "one continuous bar" look (e.g.
         Outlook). Its one hard constraint: the status bar's own icons
         (time/battery/signal) always render white once translucent, with no
         way to request dark icons — so this only works where the top of the
         page has a sufficiently dark/colored background for them to sit on.
         The default theme's --sidebar-bg is white, so ConfigContext sets
         this to 'default' (opaque, dark icons) at runtime — this static
         pre-JS value matches that, rather than the black-translucent style
         meant for a dark sidebar, to avoid a flash of invisible
         white-on-white icons before React mounts. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="OneCampus" />
    <!-- Launch screen shown while the installed PWA is starting, before
         index.css/main.jsx paint anything — only applies to a standalone/
         home-screen launch, exactly like the three tags above; visiting the
         site as a normal Safari tab never shows this. iOS doesn't derive a
         launch screen from the web manifest the way Android does, AND it
         only uses a startup image whose pixel size exactly matches the
         device screen — an unmatched (or media-query-less single) image is
         silently ignored and the launch shows plain white. Hence one image
         per device class below, matched by device-width/height + DPR; all
         are the same design (white + the icon-512x512.svg OneC mark),
         generated by screenshotting that design at each resolution. XR and
         XS Max share 414x896pt, so the -webkit-device-pixel-ratio term is
         what disambiguates those two. -->
    <link rel="apple-touch-startup-image" media="(device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" href="/apple-splash-640x1136.png" />
    <link rel="apple-touch-startup-image" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" href="/apple-splash-750x1334.png" />
